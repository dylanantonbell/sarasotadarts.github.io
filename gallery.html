<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sarasota Darts | Gallery</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header>
    <h1>Gallery</h1>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html">About</a>
      <a href="leagues.html">Leagues</a>
      <a href="bars.html">Bars & Venues</a>
      <a href="blinddraws.html">Blind Draws</a>
      <a href="gallery.html" aria-current="page">Gallery</a>
      <a href="shops.html">Shops</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="gallery-page">
      <h2 class="section-title">Recent Photos</h2>
      <nav class="gallery-category-nav" aria-label="Gallery categories" id="galleryCategoryNav"></nav>
      <div class="gallery-sections" id="galleryContainer"></div>
    </section>
  </main>

  <!-- Lightbox Container -->
  <div id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="" alt="Full-size preview" />
    <p id="lightbox-caption"></p>
  </div>

  <footer>
    <p>&copy; Sarasota Darts - TDLS</p>
    <p>Last Updated June 2026</p>
    <p>
      <a href="https://www.facebook.com/groups/1084653745684918/" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-facebook"></i> Join our Facebook Group
      </a>
    </p>
  </footer>

  <script src="gallery-data.js"></script>
  <script>
    const categoryOrder = [
      "Blind Draws",
      "TDLS Teams",
      "MDLS Teams",
      "Venues",
      "State Team",
      "Logos"
    ];

    const galleryContainer = document.getElementById("galleryContainer");
    const categoryNav = document.getElementById("galleryCategoryNav");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const lightboxCaption = document.getElementById("lightbox-caption");

    function makeCategoryId(category) {
      return category.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    categoryOrder.forEach(category => {
      const images = galleryImages.filter(item => item.category === category);
      if (!images.length) {
        return;
      }

      const categoryId = makeCategoryId(category);
      const button = document.createElement("a");
      button.href = `#${categoryId}`;
      button.textContent = category;
      categoryNav.appendChild(button);

      const section = document.createElement("section");
      section.className = "gallery-category";
      section.id = categoryId;

      const heading = document.createElement("h3");
      heading.textContent = category;
      section.appendChild(heading);

      const grid = document.createElement("div");
      grid.className = "gallery";

      images.forEach(item => {
        const card = document.createElement("figure");
        card.className = "gallery-card";

        const img = document.createElement("img");
        img.src = item.image;
        img.alt = item.title;
        img.loading = "lazy";
        img.addEventListener("click", () => {
          lightbox.style.display = "flex";
          lightboxImg.src = item.image;
          lightboxImg.alt = item.title;
          lightboxCaption.textContent = item.caption;
        });

        const caption = document.createElement("figcaption");
        const title = document.createElement("strong");
        title.textContent = item.title;
        const text = document.createElement("span");
        text.textContent = item.caption;
        caption.appendChild(title);
        caption.appendChild(text);

        card.appendChild(img);
        card.appendChild(caption);
        grid.appendChild(card);
      });

      section.appendChild(grid);
      galleryContainer.appendChild(section);
    });

    lightbox.addEventListener("click", () => {
      lightbox.style.display = "none";
      lightboxImg.src = "";
      lightboxCaption.textContent = "";
    });

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") {
        lightbox.style.display = "none";
        lightboxImg.src = "";
        lightboxCaption.textContent = "";
      }
    });
  </script>
</body>
</html>
